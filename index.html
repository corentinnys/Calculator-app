<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  
  <title>Frontend Mentor | Calculator app</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
</head>
<body>
    <main class="w-30 p-3">

        <div class="d-flex  mb-3 bg-dark text-white justify-content-end p-2">
            0
        </div>

        <div class="d-flex justify-content-around mb-3 gap-3">
            <button class="btn btn-light">7</button>
            <button class="btn btn-light">8</button>
            <button class="btn btn-light">9</button>
            <button class="btn btn-danger">del</button>
        </div>
        <div class="d-flex justify-content-around gap-3 mb-3">
            <button class="btn btn-light">4</button>
            <button class="btn btn-light">5</button>
            <button class="btn btn-light">6</button>
            <button class="btn btn-danger">+</button>
        </div>
        <div class="d-flex justify-content-around gap-3 mb-3">
            <button class="btn btn-light">1</button>
            <button class="btn btn-light">2</button>
            <button class="btn btn-light">3</button>
            <button class="btn btn-danger">-</button>
        </div>
        <div class="d-flex justify-content-around gap-3 mb-3">
            <button class="btn btn-light">.</button>
            <button class="btn btn-light">0</button>
            <button class="btn btn-light">/</button>
            <button class="btn btn-danger">*</button>
        </div>
        <div class="d-flex justify-content-around gap-3">
            <button class="btn btn-light">Reset</button>
            <button class="btn btn-light">=</button>
        </div>



    </main>

  
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Your Name Here</a>.
  </footer>
</body>
</html>
